name: "HCL AppScan DAST - basic"

on:
  workflow_dispatch

jobs:
  scan:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AppScan Root CA Certificate
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force

          $certBase64 = "${{ secrets.CORP_CA_CERT }}"
          $certBytes = [Convert]::FromBase64String($certBase64)

          $certPath = "$env:RUNNER_TEMP\ascp-dart-prime-root-ca.cer"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          Import-Certificate `
            -FilePath $certPath `
            -CertStoreLocation Cert:\LocalMachine\Root

          Write-Host "AppScan Root CA certificate installed successfully."

      - name: Run AppScan 360 DAST Scan
        uses: ankurraina66/test_dast_action@main
        with:
          baseurl: https://blmycldtl446131.nonprod.hclpnp.com
          asoc_key: ${{ secrets.ASOC_KEY }}
          asoc_secret: ${{ secrets.ASOC_SECRET }}
          application_id: 1dd70de0-f756-4cd4-bad3-8354731ceff4
          dynamic_scan_type: dast
          starting_URL: 'https://demo.testfire.net?mode=demo'
          login_method: userpass
          login_user: jsmith
          login_password: demo1234
          network: public
          fail_for_noncompliance: false
          wait_for_analysis: true

      - name: Upload HCL AppScan HTML Report to Github Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AppScan Security Scan HTML Report
          path: '**/AppScan*.html'
        if: always()
