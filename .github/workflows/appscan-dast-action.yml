name: "HCL AppScan DAST - basic"

on:
  workflow_dispatch

jobs:
  scan:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test AppScan API connectivity
        shell: powershell -ExecutionPolicy Bypass -File {0}
        run: |
          Write-Host "Testing connectivity to AppScan API..."
          try {
            $response = Invoke-WebRequest -Uri "https://blmycldtl446131.nonprod.hclpnp.com/api/v4" -UseBasicParsing
            Write-Host "Connection successful. Status code:" $response.StatusCode
          } catch {
            Write-Host "Connection failed."
            Write-Host $_.Exception.Message
            throw
          }

      - name: Run AppScan 360 DAST Scan
        uses: ankurraina66/test_dast_action@main
        with:
          baseurl: https://blmycldtl446131.nonprod.hclpnp.com
          asoc_key: ${{ secrets.ASOC_KEY }}
          asoc_secret: ${{ secrets.ASOC_SECRET }}
          application_id: 1dd70de0-f756-4cd4-bad3-8354731ceff4
          dynamic_scan_type: dast
          starting_URL: 'https://demo.testfire.net?mode=demo'
          login_method: userpass
          login_user: jsmith
          login_password: demo1234
          network: public
          fail_for_noncompliance: false
          wait_for_analysis: true

      - name: Upload HCL AppScan HTML Report to Github Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AppScan Security Scan HTML Report
          path: '**/AppScan*.html'
        if: always()
