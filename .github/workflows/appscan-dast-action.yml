name: "HCL AppScan DAST - basic (Local Patched)"

on:
  workflow_dispatch:
    inputs:
      skip_cert:
        description: "Skip SSL certificate validation?"
        required: false
        default: "false"

jobs:
  scan:
    runs-on: self-hosted

    env:
      ASOC_SKIP_CERT: ${{ github.event.inputs.skip_cert }}

    steps:

      # --------------------------------------------------
      # Checkout ONLY if skip_cert is false
      # --------------------------------------------------
      - name: Checkout Repository
        if: env.ASOC_SKIP_CERT != 'true'
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Run Local Patched Script
      # --------------------------------------------------
      - name: Run AppScan 360 DAST Scan (Local Patched Script)
        shell: pwsh
        run: |

          $scriptPath = "C:\Users\ankur.raina\asoc-appscan360\HCL-TECH-SOFTWARE\appscan-dast-action\v1.0.7\asoc.ps1"

          if (!(Test-Path $scriptPath)) {
              Write-Error "asoc.ps1 not found at $scriptPath"
              exit 1
          }

          Write-Host "Using patched script at: $scriptPath"
          Write-Host "ASOC_SKIP_CERT = $env:ASOC_SKIP_CERT"

          & $scriptPath `
            -baseurl "https://cloud.appscan.com" `
            -asoc_key "${{ secrets.ASOC_KEY }}" `
            -asoc_secret "${{ secrets.ASOC_SECRET }}" `
            -application_id "e17e1275-c881-43f4-af46-4b4e5c57114f" `
            -dynamic_scan_type "dast" `
            -starting_URL "https://demo.testfire.net?mode=demo" `
            -login_method "userpass" `
            -login_user "jsmith" `
            -login_password "demo1234" `
            -network "public" `
            -fail_for_noncompliance $false `
            -wait_for_analysis $true

      # --------------------------------------------------
      # Upload Report
      # --------------------------------------------------
      - name: Upload HCL AppScan HTML Report to GitHub Artifacts
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: AppScan Security Scan HTML Report
          path: '**/AppScan*.html'
